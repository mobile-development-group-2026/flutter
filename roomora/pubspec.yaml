name: roomora
description: A landlord and student app for property listings
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.20.2
  http: ^1.3.0
  shared_preferences: ^2.5.2
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  dart_jsonwebtoken: ^2.17.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  lucide_icons_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora-Light.ttf
          weight: 300
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500